{{ $form := site.Data.forms.product_brochure }}
<div id="product-brochure-modal" class="fixed inset-0 z-[260] hidden items-center justify-center bg-[#0b2540]/70 px-2 py-4 sm:px-5 sm:py-8" aria-hidden="true">
  <div class="absolute inset-0" data-close-product-brochure></div>
  <div class="relative z-[1] w-full max-w-[520px] overflow-hidden rounded-[10px] bg-white shadow-[0_24px_80px_rgba(0,0,0,0.38)]">
    <form autocomplete="off" role="form" method="post" action="{{ $form.action }}" id="mauticform_downloadtheproductbrochure" data-mautic-form="downloadtheproductbrochure" enctype="multipart/form-data" class="rounded-[10px]">
      <div class="flex items-center justify-between bg-[#0288d1] px-4 py-4 sm:px-5">
        <h3 class="text-[1.15rem] font-medium leading-tight text-white sm:text-[1.25rem]">{{ $form.title }}</h3>
        <button type="button" class="inline-flex h-8 w-8 items-center justify-center rounded-full text-[#9fd1f1] transition-colors hover:bg-white/10 hover:text-white" aria-label="Close" data-close-product-brochure>
          <span class="text-[2rem] leading-none">&times;</span>
        </button>
      </div>

      <div class="px-4 py-5 sm:px-5">
        <div id="mauticform_downloadtheproductbrochure_error" class="mauticform-error hidden rounded-[4px] border border-[#d56a7d] bg-[#fff1f4] px-4 py-3 text-[0.95rem] text-[#a31f3d]"></div>
        <div id="mauticform_downloadtheproductbrochure_message" class="mauticform-message hidden rounded-[4px] border border-[#58a56a] bg-[#eef9f0] px-4 py-3 text-[0.95rem] text-[#176b28]"></div>

        <div class="space-y-5">
          <div id="mauticform_downloadtheproductbrochure_first_name" class="mauticform-row">
            <label for="mauticform_input_downloadtheproductbrochure_first_name" class="mauticform-label mb-2 block text-[0.98rem] font-normal leading-[1.4] text-[#333132]">
              {{ $form.first_name_label }} <span class="text-[#d93025]">*</span>
            </label>
            <input id="mauticform_input_downloadtheproductbrochure_first_name" name="mauticform[first_name]" value="" class="mauticform-input min-h-[38px] w-full rounded-[4px] border border-[#c5d6e6] px-3 py-[10px] text-[1rem] text-[#333132] outline-none transition focus:border-[#0288d1]" type="text" required>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_downloadtheproductbrochure_last_name" class="mauticform-row">
            <label for="mauticform_input_downloadtheproductbrochure_last_name" class="mauticform-label mb-2 block text-[0.98rem] font-normal leading-[1.4] text-[#333132]">
              {{ $form.last_name_label }} <span class="text-[#d93025]">*</span>
            </label>
            <input id="mauticform_input_downloadtheproductbrochure_last_name" name="mauticform[last_name]" value="" class="mauticform-input min-h-[38px] w-full rounded-[4px] border border-[#c5d6e6] px-3 py-[10px] text-[1rem] text-[#333132] outline-none transition focus:border-[#0288d1]" type="text" required>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_downloadtheproductbrochure_business_email" class="mauticform-row">
            <label for="mauticform_input_downloadtheproductbrochure_business_email" class="mauticform-label mb-2 block text-[0.98rem] font-normal leading-[1.4] text-[#333132]">
              {{ $form.email_label }} <span class="text-[#d93025]">*</span>
            </label>
            <input id="mauticform_input_downloadtheproductbrochure_business_email" name="mauticform[business_email]" value="" class="mauticform-input min-h-[38px] w-full rounded-[4px] border border-[#c5d6e6] px-3 py-[10px] text-[1rem] text-[#333132] outline-none transition focus:border-[#0288d1]" type="email" required>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_downloadtheproductbrochure_consent" class="mauticform-row">
            <label class="flex items-start gap-3 text-[0.94rem] leading-[1.55] text-[#333132]">
              <input class="mauticform-checkboxgrp-checkbox mt-1 h-4 w-4 shrink-0 rounded border border-[#c5d6e6] accent-[#0288d1]" name="mauticform[consent][]" id="mauticform_downloadtheproductbrochure_checkboxgrp_checkbox_consent_0" type="checkbox" value="yes">
              <span>{{ $form.consent_label | safeHTML }}</span>
            </label>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]"></span>
          </div>

          <div class="mauticform-row">
            <div id="mauticform_downloadtheproductbrochure_hcaptcha" class="h-captcha min-h-[78px] min-w-[302px]" data-sitekey="{{ $form.sitekey }}"></div>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]" id="mauticform_downloadtheproductbrochure_hcaptcha_error"></span>
          </div>
        </div>

        <input type="hidden" name="mauticform[formId]" id="mauticform_downloadtheproductbrochure_id" value="{{ $form.form_id }}">
        <input type="hidden" name="mauticform[return]" id="mauticform_downloadtheproductbrochure_return" value="">
        <input type="hidden" name="mauticform[formName]" id="mauticform_downloadtheproductbrochure_name" value="{{ $form.form_name }}">
        <input type="hidden" name="mauticform[submit]" id="mauticform_downloadtheproductbrochure_submit_value" value="1">
        <div id="mauticform_downloadtheproductbrochure_tralala"></div>
      </div>

      <div class="border-t border-[#d9d9d9] bg-[#f4f4f4] px-4 py-4 sm:px-5">
        <button id="mauticform_input_downloadtheproductbrochure_verify_and_submit" type="button" class="inline-flex rounded-[4px] bg-[#0288d1] px-4 py-3 text-[1rem] font-medium text-white transition-colors hover:bg-[#0277bd] disabled:cursor-not-allowed disabled:opacity-70">
          {{ $form.submit_label }}
        </button>
      </div>
    </form>
  </div>
</div>
