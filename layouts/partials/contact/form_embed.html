<div class="contact-form-shell w-full min-w-0 xl:max-w-[33.5rem]">
  <form autocomplete="false" role="form" method="post" action="https://mautic.steeltrace.io/form/submit?formId=9" id="mauticform_contact" data-mautic-form="contact" enctype="multipart/form-data" class="grid gap-3">
    <div id="mauticform_wrapper_contact" class="mauticform_wrapper blockchain_form grid gap-3">
      <div class="mauticform-error alert alert-danger hidden rounded-[0.55em] border border-[#f54e7c] bg-[#fff1f5] px-4 py-3 text-[0.9rem] leading-[1.5] text-[#8a1736]" id="mauticform_contact_error"></div>
      <div class="mauticform-message alert alert-success hidden rounded-[0.55em] border border-[#7fc5f2] bg-[#eff9ff] px-4 py-3 text-[0.9rem] leading-[1.5] text-[#01466c]" id="mauticform_contact_message"></div>

      <div class="mauticform-innerform grid gap-3">
        <div class="mauticform-page-wrapper mauticform-page-1 grid gap-3" data-mautic-form-page="1">
          <div id="mauticform_contact_first_name" class="mauticform-row mauticform-text mauticform-field-1 mb-3 mauticform-required has-validation grid gap-2">
            <label id="mauticform_label_contact_first_name" for="mauticform_input_contact_first_name" class="mauticform-label form-label block text-[0.94rem] font-medium leading-[1.5] text-[#333132] after:text-[#c9284c] after:content-['_*']">First name</label>
            <input id="mauticform_input_contact_first_name" name="mauticform[first_name]" value="" class="mauticform-input form-control block w-full rounded-[0.55em] border border-[#b7c7d3] bg-white px-3.5 py-2 text-[0.95rem] leading-[1.5] text-[#333132] shadow-[1px_3px_5px_rgba(0,0,0,0.08)] outline-none transition-colors focus:border-[#0278b8]" type="text">
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_contact_last_name" class="mauticform-row mauticform-text mauticform-field-2 mb-3 mauticform-required has-validation grid gap-2">
            <label id="mauticform_label_contact_last_name" for="mauticform_input_contact_last_name" class="mauticform-label form-label block text-[0.94rem] font-medium leading-[1.5] text-[#333132] after:text-[#c9284c] after:content-['_*']">Last name</label>
            <input id="mauticform_input_contact_last_name" name="mauticform[last_name]" value="" class="mauticform-input form-control block w-full rounded-[0.55em] border border-[#b7c7d3] bg-white px-3.5 py-2 text-[0.95rem] leading-[1.5] text-[#333132] shadow-[1px_3px_5px_rgba(0,0,0,0.08)] outline-none transition-colors focus:border-[#0278b8]" type="text">
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_contact_company" class="mauticform-row mauticform-text mauticform-field-3 mb-3 mauticform-required has-validation grid gap-2">
            <label id="mauticform_label_contact_company" for="mauticform_input_contact_company" class="mauticform-label form-label block text-[0.94rem] font-medium leading-[1.5] text-[#333132] after:text-[#c9284c] after:content-['_*']">Company</label>
            <input id="mauticform_input_contact_company" name="mauticform[company]" value="" class="mauticform-input form-control block w-full rounded-[0.55em] border border-[#b7c7d3] bg-white px-3.5 py-2 text-[0.95rem] leading-[1.5] text-[#333132] shadow-[1px_3px_5px_rgba(0,0,0,0.08)] outline-none transition-colors focus:border-[#0278b8]" type="text">
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_contact_email" class="mauticform-row mauticform-text mauticform-field-4 mb-3 mauticform-required has-validation grid gap-2">
            <label id="mauticform_label_contact_email" for="mauticform_input_contact_email" class="mauticform-label form-label block text-[0.94rem] font-medium leading-[1.5] text-[#333132] after:text-[#c9284c] after:content-['_*']">Email</label>
            <input id="mauticform_input_contact_email" name="mauticform[email]" value="" class="mauticform-input form-control block w-full rounded-[0.55em] border border-[#b7c7d3] bg-white px-3.5 py-2 text-[0.95rem] leading-[1.5] text-[#333132] shadow-[1px_3px_5px_rgba(0,0,0,0.08)] outline-none transition-colors focus:border-[#0278b8]" type="email">
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_contact_f_message" class="mauticform-row mauticform-text mauticform-field-5 mb-3 mauticform-required has-validation grid gap-2">
            <label id="mauticform_label_contact_f_message" for="mauticform_input_contact_f_message" class="mauticform-label form-label block text-[0.94rem] font-medium leading-[1.5] text-[#333132] after:text-[#c9284c] after:content-['_*']">Message</label>
            <textarea id="mauticform_input_contact_f_message" name="mauticform[f_message]" class="mauticform-input form-control block min-h-[7.75rem] w-full rounded-[0.55em] border border-[#b7c7d3] bg-white px-3.5 py-2.5 text-[0.95rem] leading-[1.5] text-[#333132] shadow-[1px_3px_5px_rgba(0,0,0,0.08)] outline-none transition-colors focus:border-[#0278b8]" rows="4"></textarea>
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]"></span>
          </div>

          <div id="mauticform_contact_consent" class="mauticform-row mauticform-checkboxgrp mauticform-field-6 mb-3 grid gap-2">
            <label id="mauticform_label_contact_consent" for="mauticform_input_contact_consent" class="mauticform-label form-label hidden"></label>
            <div class="mauticform-checkboxgrp-row block">
              <label id="mauticform_checkboxgrp_label_consent_0" for="mauticform_checkboxgrp_checkbox_consent_0" class="checkbox-label flex items-start gap-3 text-[0.92rem] leading-[1.6] text-[#333132]">
                <input class="mauticform-checkboxgrp-checkbox form-check-input mauticFormConsentCheckbox mt-[0.3rem] h-4 w-4 shrink-0" name="mauticform[consent][]" id="mauticform_contact_checkboxgrp_checkbox_consent_0" type="checkbox" value="yes" data-submit-id="mauticform_input_contact_verify_and_submit">
                <small class="block text-[0.92rem] leading-[1.6] text-[#333132]">I consent to SteelTrace processing my data as per the <a href="/privacy/" target="_blank" rel="noreferrer" class="text-[#283339] underline underline-offset-4 transition-colors hover:text-[#01466c]">privacy statement</a></small>
              </label>
            </div>
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]"></span>
          </div>

          <div class="mauticform-row mauticform-div-wrapper mauticform-field-6 mb-3 grid gap-2">
            <div class="overflow-x-auto">
              <div id="mauticform_contact_hcaptcha" class="h-captcha min-h-[78px] min-w-[302px]" data-sitekey="54dbef36-8433-4901-9338-6a57133127c4"></div>
            </div>
            <span class="mauticform-errormsg hidden text-[0.86rem] leading-[1.5] text-[#c9284c]" id="mauticform_contact_hcaptcha_error"></span>
          </div>
        </div>
      </div>

      <input type="hidden" name="mauticform[formId]" id="mauticform_contact_id" value="9">
      <input type="hidden" name="mauticform[return]" id="mauticform_contact_return" value="">
      <input type="hidden" name="mauticform[formName]" id="mauticform_contact_name" value="contact">
      <input type="hidden" name="mauticform[submit]" id="mauticform_contact_submit_value" value="1">
      <div id="mauticform_contact_tralala"></div>
    </div>

    <div id="mauticform_contact_submit" class="mauticform-row mauticform-button-wrapper mauticform-field-submit pt-1">
      <button id="mauticform_input_contact_verify_and_submit" class="mauticform-button btn btn-default btn-primary inline-flex w-fit rounded-md bg-[#0278b8] px-6 py-2.5 text-[0.96rem] font-medium leading-[1.5] text-white shadow-[1px_3px_5px_rgba(0,0,0,0.2)] transition-colors hover:bg-[#01466c] disabled:cursor-not-allowed disabled:opacity-70" type="button">Get in Touch!</button>
    </div>
  </form>
</div>
