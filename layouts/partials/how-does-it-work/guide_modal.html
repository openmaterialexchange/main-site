{{ $modal := .Params.guide.modal }}
<div id="blockchain-guide-modal" class="fixed inset-0 z-[250] hidden items-center justify-center bg-[#0b2540]/70 px-5 py-8" aria-hidden="true">
  <div class="absolute inset-0" data-close-blockchain-guide></div>
  <div class="relative z-[1] w-full max-w-[560px] rounded-[24px] bg-white shadow-[0_24px_80px_rgba(0,0,0,0.28)]">
    <form autocomplete="off" role="form" method="post" action="{{ $modal.action }}" id="mauticform_downloadtheblockchainguide" data-mautic-form="downloadtheblockchainguide" enctype="multipart/form-data" class="rounded-[24px]">
      <div class="flex items-center justify-between border-b border-black/10 px-6 py-5 md:px-8">
        <h3 class="text-[1.4rem] font-medium leading-tight text-[#333132]">{{ $modal.title }}</h3>
        <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full text-[#6d7278] transition-colors hover:bg-black/5 hover:text-[#333132]" aria-label="{{ $modal.close_label }}" data-close-blockchain-guide>
          <span class="text-[1.8rem] leading-none">&times;</span>
        </button>
      </div>
      <div class="px-6 py-6 md:px-8">
        <div id="mauticform_downloadtheblockchainguide_error" class="mauticform-error hidden rounded-md border border-[#d56a7d] bg-[#fff1f4] px-4 py-3 text-[0.95rem] text-[#a31f3d]"></div>
        <div id="mauticform_downloadtheblockchainguide_message" class="mauticform-message hidden rounded-md border border-[#58a56a] bg-[#eef9f0] px-4 py-3 text-[0.95rem] text-[#176b28]"></div>
        <div class="space-y-5">
          <div id="mauticform_downloadtheblockchainguide_email" class="mauticform-row">
            <label for="mauticform_input_downloadtheblockchainguide_email" class="mauticform-label mb-2 block text-[1rem] font-medium text-[#333132]">{{ $modal.email_label }}</label>
            <input id="mauticform_input_downloadtheblockchainguide_email" name="mauticform[email]" value="" class="mauticform-input min-h-[52px] w-full rounded-[14px] border border-[#b8cee3] px-4 text-[1rem] text-[#333132] shadow-[0_2px_10px_rgba(2,136,209,0.08)] outline-none transition focus:border-[#0288d1]" type="email" required>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]"></span>
          </div>
          <div id="mauticform_downloadtheblockchainguide_consent" class="mauticform-row">
            <label class="flex items-start gap-3 text-[0.98rem] leading-[1.55] text-[#333132]">
              <input class="mauticform-checkboxgrp-checkbox mt-1 h-4 w-4 shrink-0 rounded border border-[#b8cee3] accent-[#0288d1]" name="mauticform[consent][]" id="mauticform_downloadtheblockchainguide_checkboxgrp_checkbox_consent_0" type="checkbox" value="yes">
              <span>{{ $modal.consent_label | safeHTML }}</span>
            </label>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]"></span>
          </div>
          <div class="mauticform-row">
            <div id="mauticform_downloadtheblockchainguide_hcaptcha" class="h-captcha min-h-[78px] min-w-[302px]" data-sitekey="{{ $modal.sitekey }}"></div>
            <span class="mauticform-errormsg hidden pt-2 text-[0.86rem] text-[#c9284c]" id="mauticform_downloadtheblockchainguide_hcaptcha_error"></span>
          </div>
        </div>
        <input type="hidden" name="mauticform[formId]" id="mauticform_downloadtheblockchainguide_id" value="{{ $modal.form_id }}">
        <input type="hidden" name="mauticform[return]" id="mauticform_downloadtheblockchainguide_return" value="">
        <input type="hidden" name="mauticform[formName]" id="mauticform_downloadtheblockchainguide_name" value="{{ $modal.form_name }}">
        <div id="mauticform_downloadtheblockchainguide_tralala"></div>
      </div>
      <div class="flex justify-end border-t border-black/10 px-6 py-5 md:px-8">
        <button id="mauticform_input_downloadtheblockchainguide_verify_and_submit" type="button" class="inline-flex rounded-md bg-[#0278b8] px-6 py-3 text-[1rem] font-medium text-white transition-colors hover:bg-[#01466c]">{{ $modal.submit_label }}</button>
      </div>
    </form>
  </div>
</div>
