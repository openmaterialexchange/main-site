{{ $weekly := .Params.weekly_demo }}
{{ with $weekly.form }}
  <div class="w-full min-w-0">
    <form
      autocomplete="off"
      method="post"
      action="{{ .action }}"
      id="weekly-demo-form"
      class="grid"
      role="form"
      data-mautic-form="{{ .form_name }}"
      data-weekly-even-week-time="{{ $weekly.schedule.even_week_time }}"
      data-weekly-odd-week-time="{{ $weekly.schedule.odd_week_time }}"
      data-weekly-slot-count="{{ $weekly.schedule.slot_count }}"
      enctype="multipart/form-data"
      novalidate
    >
      <div class="grid">
        <div id="weekly_demo_first_name" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_first_name" class="block text-[1rem] font-normal leading-[1.5] text-[#212529] after:text-[#d00] after:content-['_*']">{{ .labels.first_name }}</label>
          <input id="weekly_demo_input_first_name" name="mauticform[first_name]" class="block h-[calc(1.5em+0.75rem+2px)] w-full rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] placeholder:text-[#ccc] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0" type="text" autocomplete="given-name">
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_last_name" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_last_name" class="block text-[1rem] font-normal leading-[1.5] text-[#212529] after:text-[#d00] after:content-['_*']">{{ .labels.last_name }}</label>
          <input id="weekly_demo_input_last_name" name="mauticform[last_name]" class="block h-[calc(1.5em+0.75rem+2px)] w-full rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] placeholder:text-[#ccc] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0" type="text" autocomplete="family-name">
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_email" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_email" class="block text-[1rem] font-normal leading-[1.5] text-[#212529] after:text-[#d00] after:content-['_*']">{{ .labels.email }}</label>
          <input id="weekly_demo_input_email" name="mauticform[email]" class="block h-[calc(1.5em+0.75rem+2px)] w-full rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] placeholder:text-[#ccc] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0" type="email" autocomplete="email">
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_date" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_date" class="block text-[1rem] font-normal leading-[1.5] text-[#212529] after:text-[#d00] after:content-['_*']">{{ .labels.date }}</label>
          <div class="relative">
            <select id="weekly_demo_input_date" name="mauticform[date]" class="block h-[calc(1.5em+0.75rem+2px)] w-full appearance-none rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] pr-7 text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0">
              <option value="">{{ .labels.date_placeholder }}</option>
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-[#343a40]">
              <svg class="h-[12px] w-4" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2 5L8 11L14 5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
              </svg>
            </span>
          </div>
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_company" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_company" class="block text-[1rem] font-normal leading-[1.5] text-[#212529] after:text-[#d00] after:content-['_*']">{{ .labels.company }}</label>
          <input id="weekly_demo_input_company" name="mauticform[company]" class="block h-[calc(1.5em+0.75rem+2px)] w-full rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] placeholder:text-[#ccc] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0" type="text" autocomplete="organization">
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_company_type" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_company_type" class="block text-[1rem] font-normal leading-[1.5] text-[#212529]">{{ .labels.company_type }}</label>
          <div class="relative">
            <select id="weekly_demo_input_company_type" name="mauticform[company_type]" class="block h-[calc(1.5em+0.75rem+2px)] w-full appearance-none rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] pr-7 text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0">
              <option value="">{{ .labels.company_type_placeholder }}</option>
              {{ range .company_types }}
                <option value="{{ . }}">{{ . }}</option>
              {{ end }}
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-[#343a40]">
              <svg class="h-[12px] w-4" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2 5L8 11L14 5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
              </svg>
            </span>
          </div>
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_notes" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_notes" class="block text-[1rem] font-normal leading-[1.5] text-[#212529]">{{ .labels.notes }}</label>
          <textarea id="weekly_demo_input_notes" name="mauticform[anything_in_particular_yo]" class="block w-full rounded-[0.25rem] border border-[#ced4da] bg-white px-3 py-[0.375rem] text-[1rem] font-normal leading-[1.5] text-[#212529] shadow-none outline-none transition-[border-color,box-shadow] placeholder:text-[#ccc] focus:border-[#86b7fe] focus:ring-4 focus:ring-[rgba(13,110,253,0.25)] focus:ring-offset-0" rows="2"></textarea>
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        <div id="weekly_demo_consent" class="mb-4 grid gap-2">
          <label for="weekly_demo_input_consent" class="checkbox-label relative block pl-[22px] text-[1rem] font-light leading-[1.5] text-[#212529]">
            <input id="weekly_demo_input_consent" name="mauticform[webinar_consent][]" class="absolute left-0 top-[0.28rem] h-4 w-4 rounded border border-[#b7c7d3] accent-[#0288D1]" type="checkbox" value="true">
            <span class="[&_a]:text-[#0288D1] [&_a]:underline [&_a]:underline-offset-2 hover:[&_a]:text-[#2A274F]">{{ .labels.consent | safeHTML }}</span>
          </label>
          <span data-weekly-error class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
        </div>

        {{ if .captcha_enabled }}
          <div class="mb-4 grid gap-2">
            <div class="overflow-x-auto">
              <div id="weekly_demo_hcaptcha" class="h-captcha min-h-[78px] min-w-[302px]" data-sitekey="{{ .sitekey }}"></div>
            </div>
            <span id="weekly_demo_hcaptcha_error" class="hidden text-[0.875rem] leading-[1.5] text-[#dc3545]"></span>
          </div>
        {{ end }}

        <div id="weekly_demo_error" class="mb-4 hidden rounded-[0.25rem] border border-[#f5c2c7] bg-[#f8d7da] px-4 py-4 text-[1rem] leading-[1.5] text-[#842029]"></div>
        <div id="weekly_demo_message" class="mb-4 hidden rounded-[0.25rem] border border-[#badbcc] bg-[#d1e7dd] px-4 py-4 text-[1rem] leading-[1.5] text-[#0f5132]"></div>

        <input type="hidden" name="mauticform[formId]" id="mauticform_weeklyproductdemo_id" value="{{ .form_id }}">
        <input type="hidden" name="mauticform[return]" id="mauticform_weeklyproductdemo_return" value="">
        <input type="hidden" name="mauticform[formName]" id="mauticform_weeklyproductdemo_name" value="{{ .form_name }}">
        <input type="hidden" name="mauticform[submit]" id="mauticform_weeklyproductdemo_submit_value" value="1">
        <div id="weekly_demo_tralala"></div>

        <div class="mb-4">
          <button id="weekly_demo_submit" class="inline-block rounded-[0.25rem] border border-[#0288D1] bg-[#0288D1] px-3 py-[0.375rem] text-[1rem] font-normal leading-[1.5] text-white transition-colors hover:border-[#0278b8] hover:bg-[#0278b8] disabled:cursor-not-allowed disabled:opacity-70" type="submit">
            {{ .labels.submit }}
          </button>
        </div>
      </div>
    </form>
  </div>
{{ end }}
