{{ with .Params.weekly_demo }}
  <div class="grid gap-y-0 lg:grid-cols-[minmax(0,1fr)_minmax(0,1fr)]">
    <div class="min-w-0 px-12 lg:pl-2 lg:pr-12">
      <h1 class="mb-2 text-[3.2rem] font-normal leading-[1.2] text-[#0288D1]">{{ $.Title }}</h1>
      <h2 class="mb-12 text-[2.4rem] font-light leading-[1.2] text-[#0288D1]">{{ .subtitle }}</h2>
    </div>

    <div class="min-w-0 px-12 text-[calc(1.425rem+2.1vw)] font-light leading-[1.2] text-[#333132] lg:pl-12 lg:pr-2 xl:text-[3rem]">
      <span>{{ .next_up_prefix }}</span>
      {{ " " }}<span id="weekly_demo_next_up_value">Loading...</span>
    </div>
  </div>
{{ end }}
