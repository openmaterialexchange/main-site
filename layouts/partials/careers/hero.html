{{ with .Params.hero }}
  <section class="bg-white">
    <div class="relative overflow-hidden bg-[#1f4f86]">
      <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('{{ .background }}');"></div>
      <div class="absolute inset-0 bg-[linear-gradient(90deg,rgba(20,52,92,0.84)_0%,rgba(24,76,130,0.74)_42%,rgba(24,76,130,0.74)_58%,rgba(20,52,92,0.84)_100%)]"></div>
      <div class="relative mx-auto max-w-[1272px] px-5 pb-16 pt-[150px] md:pb-20 md:pt-[170px]">
        <div class="mx-auto max-w-[980px] text-center text-white">
          <h1 class="text-[2.5rem] font-medium leading-[1.12] md:text-[3rem]">{{ .title }}</h1>
          <div class="mt-6 space-y-4 text-[1.08rem] leading-[1.85] md:text-[1.15rem]">
            <p class="font-semibold">{{ .lead }}</p>
            {{ range .paragraphs }}
              <p>{{ . }}</p>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </section>
{{ end }}
