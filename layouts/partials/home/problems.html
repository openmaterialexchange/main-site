{{ $demoURL := partial "demo/url.html" . }}
{{ with .Params.problems }}
<section class="bg-white">
  <div class="mx-auto max-w-[1272px] px-5 py-[6em] text-center max-[576px]:py-[4em]">
    <div>
      <p class="mb-1 text-center text-[1.65em] leading-[1.5] font-light text-[#5e5e5e] max-[576px]:text-[1.45em]">{{ .intro }}</p>
      <h2 class="mb-20 text-center text-[1.65em] leading-[1.35] font-bold text-[#5e5e5e] max-[576px]:mb-12 max-[576px]:text-[1.45em]">{{ .heading }}</h2>

      <div class="mb-0 grid gap-x-[62px] gap-y-[30px] text-left md:grid-cols-2 xl:grid-cols-3">
        {{ range .items }}
        <div class="relative pl-[1.55em] text-[1.25em] font-light leading-[1.75] text-[#5e5e5e] before:absolute before:left-[-0.1em] before:top-[0.15em] before:h-[1em] before:w-[1em] before:rounded-full before:bg-[#2287c8] before:bg-[url('/dist/images/check.svg')] before:bg-[size:0.65em] before:bg-[position:0.18em_0.18em] before:bg-no-repeat before:content-['']">
          {{ . }}
        </div>
        {{ end }}
      </div>

      <div class="mt-[6em] flex justify-center max-[576px]:mt-[4em]">
        <a href="{{ $demoURL }}" class="site-cta inline-flex items-center gap-2 rounded-md bg-[linear-gradient(128deg,#f54e7c_0%,#d04168_50%)] px-7 py-4 text-xl leading-6 font-bold whitespace-nowrap text-white shadow-[1px_3px_5px_rgba(0,0,0,0.25)] transition-colors duration-200 hover:bg-[#c9284c]">Get a Demo</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
